services:
  - type: web
    name: telegram-bozor-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATA_FILE
        value: /data/data.json
